version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: speckspace-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/speckspace
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - speckspace-network

  mongodb:
    image: mongo:7
    container_name: speckspace-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=speckspace
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - speckspace-network

  redis:
    image: redis:7-alpine
    container_name: speckspace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - speckspace-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: speckspace-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - speckspace-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  speckspace-network:
    driver: bridge
